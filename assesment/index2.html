<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Marks System</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    input, button { margin: 5px; padding: 8px; }
    .output { margin-top: 20px; padding: 10px; border: 1px solid #ccc; }
    h2 { color: #333; }
  </style>
</head>
<body>
  <h1>Student Marks Management</h1>
  
  <label>Student Name: <input type="text" id="name"></label><br>
  <label>Roll Number: <input type="text" id="roll"></label><br>
  <label>Math Marks: <input type="number" id="math"></label><br>
  <label>Science Marks: <input type="number" id="science"></label><br>
  <label>English Marks: <input type="number" id="english"></label><br>
  
  <button onclick="addStudent()">Add Student</button>
  <button onclick="displayStudents()">Display All Students</button>
  <button onclick="calculateTotals()">Calculate Totals</button>
  <button onclick="displayAbove80()">Above 80 Average</button>
  <button onclick="displayFailed()">Failed Students</button>
  <button onclick="countStudents()">Count Students</button>
  
  <div class="output" id="output"></div>
  
  <script src="script.js"></script>
</body>
</html>
